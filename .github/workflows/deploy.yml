name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 --provenance=false -t ev-learning-kit .
          docker tag ev-learning-kit:latest 349994208568.dkr.ecr.eu-west-2.amazonaws.com/prod/ev-learning-kit:latest
          docker push 349994208568.dkr.ecr.eu-west-2.amazonaws.com/prod/ev-learning-kit:latest

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ev-learning-kit-prod \
            --image-uri 349994208568.dkr.ecr.eu-west-2.amazonaws.com/prod/ev-learning-kit:latest \
            --region eu-west-2
